<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <title>Quiz App - Login</title>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">
            Quiz <span>Play</span>
        </a>
        <i class="bx bx-menu" id="menu-icon"></i>
        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="quiz.html" id="quizBtn">Quiz</a>
            <a href="lb.html" id="lbBtn">Leaderboard</a>
        </nav>
        <button class="btn" onclick="window.location.href='login.html'">Login</button>
        <button class="gradient-btn" onclick="window.location.href='signup.html'">Sign Up</button>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p>Ready to test your knowledge?</p>
            <form action="index.html" class="auth-form">
                <div class="input-group">
                    <i class='bx bx-envelope'></i>
                    <input type="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <i class='bx bx-lock-alt'></i>
                    <input type="password" placeholder="Password" required>
                </div>
                <div class="forgot-pass">
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="gradient-btn auth-submit">Login</button>
            </form>
            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Sign up</a></p>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
